<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Template</title>
  </head>
  <body>
    <div
      id="ProviderLensConfigPage"
      data-role="page"
      class="page type-interior pluginConfigurationPage"
      data-require="emby-input,emby-button,emby-select,emby-checkbox,emby-tabs"
    >
      <div data-role="content">
        <div class="content-primary">
          <div is="emby-tabs" class="emby-tabs" data-index="0">
            <div class="emby-tabs-slider" style="white-space: nowrap">
              <button
                type="button"
                is="emby-button"
                class="emby-tab-button"
                data-index="0"
              >
                <div class="emby-button-foreground">Dashboard</div>
              </button>
              <button
                type="button"
                is="emby-button"
                class="emby-tab-button"
                data-index="1"
              >
                <div class="emby-button-foreground">Settings</div>
              </button>
            </div>
          </div>

          <div class="tabContent pageTabContent" data-index="0">
            <div class="verticalSection">
              <h2 class="sectionTitle">Dashboard</h2>
              <div class="fieldDescription">
                Dashboard is not implemented yet.
              </div>
            </div>
          </div>

          <div class="tabContent pageTabContent is-active" data-index="1">
            <form id="ProviderLensConfigForm">
              <div class="inputContainer">
                <label class="inputLabel inputLabelUnfocused" for="TmdbApiKey"
                  >TMDB API Key</label
                >
                <input
                  id="TmdbApiKey"
                  name="TmdbApiKey"
                  type="text"
                  is="emby-input"
                  autocomplete="off"
                />
                <div class="fieldDescription">
                  Get your TMDB API key from
                  <a
                    href="https://www.themoviedb.org/settings/api"
                    target="_blank"
                    rel="noopener noreferrer"
                  >
                    https://www.themoviedb.org/settings/api </a
                  >.
                </div>
              </div>

              <div class="inputContainer">
                <label class="inputLabel inputLabelUnfocused" for="Country"
                  >Streaming Region</label
                >
                <input
                  id="Country"
                  name="Country"
                  type="text"
                  is="emby-input"
                  maxlength="2"
                  autocomplete="off"
                  placeholder="US"
                  required
                />
                <div class="fieldDescription">
                  Enter a 2-letter
                  <a
                    href="https://en.wikipedia.org/wiki/List_of_ISO_3166_country_codes"
                    target="_blank"
                    rel="noopener noreferrer"
                    >ISO country code
                  </a>
                  (for example: US, GB, CA). Provider matches will only be shown
                  for this country.
                </div>
              </div>

              <div class="verticalSection">
                <h2 class="sectionTitle">Streaming Services</h2>
                <div
                  class="checkboxContainer checkboxContainer-withDescription"
                >
                  <label
                    ><input
                      type="checkbox"
                      is="emby-checkbox"
                      name="providerOption"
                      value="8"
                    /><span>Netflix</span></label
                  >
                </div>
                <div
                  class="checkboxContainer checkboxContainer-withDescription"
                >
                  <label
                    ><input
                      type="checkbox"
                      is="emby-checkbox"
                      name="providerOption"
                      value="337"
                    /><span>Disney+</span></label
                  >
                </div>
                <div
                  class="checkboxContainer checkboxContainer-withDescription"
                >
                  <label
                    ><input
                      type="checkbox"
                      is="emby-checkbox"
                      name="providerOption"
                      value="9"
                    /><span>Amazon Prime Video</span></label
                  >
                </div>
              </div>

              <div class="verticalSection">
                <h2 class="sectionTitle">Monitored Libraries</h2>
                <div id="LibrariesList"></div>
              </div>

              <div>
                <button
                  is="emby-button"
                  type="submit"
                  class="raised button-submit block emby-button"
                >
                  <span>Save</span>
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <script type="text/javascript">
        (function () {
          var ProviderLensConfig = {
            pluginUniqueId: "ba6a4ff6-a27f-46e7-94ab-effb7dc39158",
          };

          var page = document.querySelector("#ProviderLensConfigPage");
          var tabs = page.querySelector('[is="emby-tabs"]');

          function getCheckedValues(name) {
            return Array.from(
              page.querySelectorAll('input[name="' + name + '"]:checked'),
            ).map(function (x) {
              return x.value;
            });
          }

          function setCheckedValues(name, values) {
            var set = new Set(values || []);
            page
              .querySelectorAll('input[name="' + name + '"]')
              .forEach(function (x) {
                x.checked = set.has(x.value);
              });
          }

          function setActiveTab(index) {
            page.querySelectorAll(".tabContent").forEach(function (panel) {
              if (parseInt(panel.getAttribute("data-index"), 10) === index) {
                panel.classList.add("is-active");
              } else {
                panel.classList.remove("is-active");
              }
            });
          }

          function escapeHtml(value) {
            return String(value)
              .replaceAll("&", "&amp;")
              .replaceAll("<", "&lt;")
              .replaceAll(">", "&gt;")
              .replaceAll('"', "&quot;")
              .replaceAll("'", "&#39;");
          }

          function renderLibraries(items, selectedIds) {
            var host = page.querySelector("#LibrariesList");
            var selectedSet = new Set(selectedIds || []);

            host.innerHTML = items
              .map(function (item) {
                var id = item.ItemId || item.Id || "";
                var name = item.Name || id;
                var checked = selectedSet.has(id) ? " checked" : "";
                return (
                  '<div class="checkboxContainer checkboxContainer-withDescription">' +
                  '<label><input type="checkbox" is="emby-checkbox" name="libraryOption" value="' +
                  escapeHtml(id) +
                  '"' +
                  checked +
                  " /><span>" +
                  escapeHtml(name) +
                  "</span></label></div>"
                );
              })
              .join("");

            if (window.CustomElements && window.CustomElements.upgradeSubtree) {
              window.CustomElements.upgradeSubtree(host);
            }
          }

          function loadLibraries(selectedLibraryIds) {
            return ApiClient.getJSON(ApiClient.getUrl("Library/VirtualFolders"))
              .then(function (libraries) {
                var items = Array.isArray(libraries) ? libraries : [];
                renderLibraries(items, selectedLibraryIds);
              })
              .catch(function () {
                renderLibraries([], selectedLibraryIds);
              });
          }

          function parseTabIndex(value) {
            var index = parseInt(value, 10);
            return Number.isNaN(index) ? 0 : index;
          }

          function selectTab(index, updateControl) {
            setActiveTab(index);

            if (updateControl) {
              if (typeof tabs.selectedIndex === "function") {
                tabs.selectedIndex(index, false);
              } else if ("selectedIndex" in tabs) {
                tabs.selectedIndex = index;
              }
            }
          }

          tabs.addEventListener("click", function (e) {
            var button = e.target.closest(".emby-tab-button");
            if (!button) {
              return;
            }

            selectTab(parseTabIndex(button.getAttribute("data-index")), true);
          });

          tabs.addEventListener("tabchange", function (e) {
            var detail = e && e.detail ? e.detail : {};
            var index = Number.isInteger(detail.selectedIndex)
              ? detail.selectedIndex
              : Number.isInteger(detail.selectedTabIndex)
                ? detail.selectedTabIndex
                : parseTabIndex(detail.index);

            selectTab(index, false);
          });

          page.addEventListener("pageshow", function () {
            Dashboard.showLoadingMsg();

            ApiClient.getPluginConfiguration(ProviderLensConfig.pluginUniqueId)
              .then(function (config) {
                page.querySelector("#TmdbApiKey").value =
                  config.TmdbApiKey || "";
                page.querySelector("#Country").value = (
                  config.Country || ""
                ).toUpperCase();
                setCheckedValues(
                  "providerOption",
                  config.SelectedProviders || [],
                );
                return loadLibraries(config.MonitoredLibraryIds || []);
              })
              .finally(function () {
                tabs.selectedIndex(0, false);
                setActiveTab(0);
                Dashboard.hideLoadingMsg();
              });
          });

          page
            .querySelector("#ProviderLensConfigForm")
            .addEventListener("submit", function (e) {
              e.preventDefault();
              Dashboard.showLoadingMsg();

              ApiClient.getPluginConfiguration(
                ProviderLensConfig.pluginUniqueId,
              )
                .then(function (config) {
                  config.TmdbApiKey = page
                    .querySelector("#TmdbApiKey")
                    .value.trim();
                  config.Country = page
                    .querySelector("#Country")
                    .value.trim()
                    .toUpperCase();
                  config.SelectedProviders = getCheckedValues("providerOption");
                  config.MonitoredLibraryIds =
                    getCheckedValues("libraryOption");
                  return ApiClient.updatePluginConfiguration(
                    ProviderLensConfig.pluginUniqueId,
                    config,
                  );
                })
                .then(function (result) {
                  Dashboard.processPluginConfigurationUpdateResult(result);
                })
                .finally(function () {
                  Dashboard.hideLoadingMsg();
                });

              return false;
            });
        })();
      </script>
    </div>
  </body>
</html>
