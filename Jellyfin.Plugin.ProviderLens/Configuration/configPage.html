<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Provider Lens</title>
  </head>
  <body>
    <div
      id="ProviderLensConfigPage"
      data-role="page"
      class="page type-interior pluginConfigurationPage"
      data-require="emby-input,emby-button,emby-select,emby-checkbox,emby-tabs"
      data-controller="__plugin/configPage.js"
    >
      <div data-role="content">
        <div class="content-primary">
          <div is="emby-tabs" class="emby-tabs" data-index="0">
            <div class="emby-tabs-slider" style="white-space: nowrap">
              <button
                type="button"
                is="emby-button"
                class="emby-tab-button"
                data-index="0"
              >
                <div class="emby-button-foreground">Matches</div>
              </button>
              <button
                type="button"
                is="emby-button"
                class="emby-tab-button"
                data-index="1"
              >
                <div class="emby-button-foreground">Settings</div>
              </button>
            </div>
          </div>

          <div class="tabContent pageTabContent is-active" data-index="0">
            <div class="verticalSection">
              <h2 class="sectionTitle">Matches</h2>
              <div id="DashboardUpdatedAt" class="fieldDescription"></div>
              <div id="DashboardTables"></div>
            </div>
          </div>

          <div class="tabContent pageTabContent" data-index="1">
            <form id="ProviderLensConfigForm">
              <div class="inputContainer">
                <label class="inputLabel inputLabelUnfocused" for="TmdbApiKey"
                  >TMDB API Key</label
                >
                <input
                  id="TmdbApiKey"
                  name="TmdbApiKey"
                  type="text"
                  is="emby-input"
                  autocomplete="off"
                />
                <div class="fieldDescription">
                  Get your TMDB API key from
                  <a
                    href="https://www.themoviedb.org/settings/api"
                    target="_blank"
                    rel="noopener noreferrer"
                  >
                    https://www.themoviedb.org/settings/api </a
                  >.
                </div>
              </div>

              <div class="inputContainer">
                <label class="inputLabel inputLabelUnfocused" for="Country"
                  >Streaming Region</label
                >
                <input
                  id="Country"
                  name="Country"
                  type="text"
                  is="emby-input"
                  maxlength="2"
                  autocomplete="off"
                  placeholder="US"
                  required
                />
                <div class="fieldDescription">
                  Enter a 2-letter
                  <a
                    href="https://en.wikipedia.org/wiki/List_of_ISO_3166_country_codes"
                    target="_blank"
                    rel="noopener noreferrer"
                    >ISO country code
                  </a>
                  (for example: US, GB, CA). Provider matches will only be shown
                  for this country.
                </div>
              </div>

              <div class="verticalSection">
                <h2 class="sectionTitle">Streaming Services</h2>
                <div
                  class="checkboxContainer checkboxContainer-withDescription"
                >
                  <label
                    ><input
                      type="checkbox"
                      is="emby-checkbox"
                      name="providerOption"
                      value="8"
                    /><span>Netflix</span></label
                  >
                </div>
                <div
                  class="checkboxContainer checkboxContainer-withDescription"
                >
                  <label
                    ><input
                      type="checkbox"
                      is="emby-checkbox"
                      name="providerOption"
                      value="337"
                    /><span>Disney+</span></label
                  >
                </div>
                <div
                  class="checkboxContainer checkboxContainer-withDescription"
                >
                  <label
                    ><input
                      type="checkbox"
                      is="emby-checkbox"
                      name="providerOption"
                      value="9"
                    /><span>Amazon Prime Video</span></label
                  >
                </div>
                <div
                  class="checkboxContainer checkboxContainer-withDescription"
                >
                  <label
                    ><input
                      type="checkbox"
                      is="emby-checkbox"
                      name="providerOption"
                      value="350"
                    /><span>Apple TV+</span></label
                  >
                </div>
                <div
                  class="checkboxContainer checkboxContainer-withDescription"
                >
                  <label
                    ><input
                      type="checkbox"
                      is="emby-checkbox"
                      name="providerOption"
                      value="15"
                    /><span>Hulu</span></label
                  >
                </div>
                <div
                  class="checkboxContainer checkboxContainer-withDescription"
                >
                  <label
                    ><input
                      type="checkbox"
                      is="emby-checkbox"
                      name="providerOption"
                      value="531"
                    /><span>Paramount Plus</span></label
                  >
                </div>
                <div
                  class="checkboxContainer checkboxContainer-withDescription"
                >
                  <label
                    ><input
                      type="checkbox"
                      is="emby-checkbox"
                      name="providerOption"
                      value="386"
                    /><span>Peacock</span></label
                  >
                </div>
                <div
                  class="checkboxContainer checkboxContainer-withDescription"
                >
                  <label
                    ><input
                      type="checkbox"
                      is="emby-checkbox"
                      name="providerOption"
                      value="384"
                    /><span>HBO Max</span></label
                  >
                </div>
              </div>

              <div class="verticalSection">
                <h2 class="sectionTitle">Monitored Libraries</h2>
                <div id="LibrariesList"></div>
              </div>

              <div>
                <button
                  is="emby-button"
                  type="submit"
                  class="raised button-submit block emby-button"
                >
                  <span>Save</span>
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
